name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npx vite build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Boot smoke test. With no Supabase env it asserts the "not configured"
      # startup path — a real white-screen/crash guard that needs no secrets.
      # The full login→visit→invoice flow self-skips without E2E_EMAIL etc.
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
